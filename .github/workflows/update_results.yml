name: Update Election Results

on:
  schedule:
    - cron: '*/5 * * * *'  # every 15 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scrapping/requirements.txt

      - name: Run scraper
        run: python3 scrapping/scrapper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados.csv data/config.json
          git diff --staged --quiet || git commit -m "Update results $(date -u '+%H:%M UTC')"
          git push
